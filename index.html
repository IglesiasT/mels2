<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>🚨 ALERTA 🚨</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&family=Pacifico&family=Fredoka:wght@500;600;700&family=Oswald:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    overflow: hidden;
    font-family: 'Nunito', sans-serif;
  }

  body { position: relative; min-height: 100vh; }

  /* ============ ALERT PAGE ============ */
  .alert-page {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 20px;
    overflow: hidden;
    background: #2b0000;
    animation: sirenFlash 0.6s steps(2) infinite;
    z-index: 1;
  }

  @keyframes sirenFlash {
    0%   { background-color: #8c0000; }
    50%  { background-color: #5c0a00; }
    100% { background-color: #8c0000; }
  }

  .beacon {
    position: absolute;
    inset: -50%;
    background: conic-gradient(from 0deg, transparent 0deg, rgba(255,210,0,0.35) 25deg, transparent 60deg, transparent 180deg, rgba(255,60,0,0.3) 210deg, transparent 250deg);
    animation: spinBeacon 2.5s linear infinite;
    pointer-events: none;
  }

  @keyframes spinBeacon {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  .marquee {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    background: #ffcc00;
    color: #2b0000;
    font-family: 'Oswald', sans-serif;
    font-weight: 700;
    font-size: clamp(0.9rem, 2vw, 1.2rem);
    letter-spacing: 2px;
    padding: 8px 0;
    white-space: nowrap;
    overflow: hidden;
    z-index: 3;
    box-shadow: 0 4px 15px rgba(0,0,0,0.4);
  }

  .marquee span {
    display: inline-block;
    padding-left: 100%;
    animation: scrollMarquee 14s linear infinite;
  }

  @keyframes scrollMarquee {
    0% { transform: translateX(0); }
    100% { transform: translateX(-100%); }
  }

  .alert-content {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    max-width: 700px;
  }

  .siren-icon {
    font-size: clamp(3.5rem, 10vw, 5.5rem);
    animation: pulseSiren 0.6s ease-in-out infinite;
    margin-bottom: 10px;
    filter: drop-shadow(0 0 20px rgba(255,200,0,0.7));
  }

  .siren-icon img {
    width: clamp(130px, 26vw, 200px);
    height: clamp(130px, 26vw, 200px);
    border-radius: 50%;
    object-fit: cover;
    display: block;
    box-shadow: 0 0 0 5px #ffcc00,
                0 8px 24px rgba(0, 0, 0, 0.5);
  }

  @keyframes pulseSiren {
    0%, 100% { transform: scale(1) rotate(-4deg); }
    50% { transform: scale(1.15) rotate(4deg); }
  }

  .alert-title {
    font-family: 'Oswald', sans-serif;
    font-weight: 700;
    font-size: clamp(1.8rem, 6vw, 3.2rem);
    color: #fff200;
    text-shadow: 0 0 12px rgba(255,210,0,0.8), 3px 3px 0 #5c0a00;
    letter-spacing: 1px;
    line-height: 1.25;
    margin-bottom: 18px;
    animation: blinkText 1s steps(1) infinite;
  }

  @keyframes blinkText {
    0%, 49% { opacity: 1; }
    50%, 100% { opacity: 0.75; }
  }

  .alert-body {
    background: rgba(0,0,0,0.35);
    border: 2px dashed #ffcc00;
    border-radius: 16px;
    padding: 18px 22px;
    margin-bottom: 30px;
  }

  .alert-body p {
    color: #ffe9c2;
    font-weight: 700;
    font-size: clamp(0.95rem, 2.4vw, 1.15rem);
    line-height: 1.5;
    margin-bottom: 8px;
  }

  .alert-body p:last-child { margin-bottom: 0; }

  .alert-body .small {
    font-size: 0.8em;
    color: #ffcc99;
    font-weight: 600;
    opacity: 0.9;
  }

  .buttons {
    display: flex;
    gap: 25px;
    flex-wrap: wrap;
    justify-content: center;
    position: relative;
  }

  .btn {
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    font-size: 1.3rem;
    padding: 18px 38px;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }

  .btn-yes {
    background: linear-gradient(135deg, #ffe066, #ffc400);
    color: #5c0a00;
    box-shadow: 0 8px 20px rgba(255, 196, 0, 0.5),
                inset 0 -4px 0 rgba(0, 0, 0, 0.12);
  }

  .btn-yes:hover {
    transform: translateY(-4px) scale(1.05);
    box-shadow: 0 12px 28px rgba(255, 196, 0, 0.6),
                inset 0 -4px 0 rgba(0, 0, 0, 0.12);
  }

  .btn-yes:active { transform: translateY(-2px) scale(1.02); }

  .btn-no {
    background: linear-gradient(135deg, #fff, #ffe5e5);
    color: #8c0000;
    box-shadow: 0 8px 20px rgba(0, 0, 0, 0.35),
                inset 0 -4px 0 rgba(0, 0, 0, 0.05);
    position: relative;
    overflow: visible;
    transition: transform 0.2s ease, box-shadow 0.2s ease,
                background 0.5s ease, color 0.5s ease;
  }

  /* Cloned "Aceptar" buttons (hydra effect) */
  .btn.clone {
    position: fixed;
    z-index: 6;
    animation: pop-in 0.35s ease backwards;
  }

  .btn-no .face,
  .btn-no .reveal { display: inline-block; }
  .btn-no .reveal { display: none; }

  .btn-no.unmasking .face {
    display: inline-block;
    animation: fall-off 0.8s cubic-bezier(.55,.085,.68,.53) forwards;
    transform-origin: center;
  }

  @keyframes fall-off {
    0% { transform: translateY(0) rotate(0); opacity: 1; }
    20% { transform: translateY(-8px) rotate(-8deg); opacity: 1; }
    100% { transform: translateY(140px) rotate(75deg); opacity: 0; }
  }

  .btn-no.unmasked {
    background: linear-gradient(135deg, #ffe066, #ffc400);
    color: #5c0a00;
    box-shadow: 0 8px 20px rgba(255, 196, 0, 0.5),
                inset 0 -4px 0 rgba(0, 0, 0, 0.12);
    animation: wiggle-reveal 0.5s ease;
  }

  @keyframes wiggle-reveal {
    0%, 100% { transform: scale(1) rotate(0); }
    25% { transform: scale(1.1) rotate(-3deg); }
    75% { transform: scale(1.1) rotate(3deg); }
  }

  .btn-no.unmasked:hover {
    transform: translateY(-4px) scale(1.05);
    box-shadow: 0 12px 28px rgba(255, 196, 0, 0.6),
                inset 0 -4px 0 rgba(0, 0, 0, 0.12);
  }

  .btn-no.unmasked .face { display: none; }
  .btn-no.unmasked .reveal {
    display: inline-block;
    animation: pop-in 0.4s ease 0.1s backwards;
  }

  @keyframes pop-in {
    0% { transform: scale(0.2); opacity: 0; }
    60% { transform: scale(1.25); opacity: 1; }
    100% { transform: scale(1); }
  }

  /* ============ PLAN / CUTE PAGE ============ */
  .plan-page {
    position: fixed;
    inset: 0;
    background: linear-gradient(135deg, #ffd6e8 0%, #ffe5d4 35%, #e8d6ff 70%, #ffd6f0 100%);
    background-size: 400% 400%;
    animation: gradientShift 12s ease infinite;
    display: none;
    flex-direction: column;
    align-items: center;
    text-align: center;
    padding: 30px 20px;
    z-index: 10;
    overflow-x: hidden;
    overflow-y: auto;
    justify-content: safe center;
  }

  @keyframes gradientShift {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  .plan-page.show {
    display: flex;
    animation: fadeIn 0.6s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: scale(0.95); }
    to { opacity: 1; transform: scale(1); }
  }

  .emoji-rain {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    overflow: hidden;
    z-index: 1;
  }

  .emoji-rain span {
    position: absolute;
    top: -50px;
    font-size: 28px;
    opacity: 0.85;
    animation: fall linear infinite;
    user-select: none;
  }

  @keyframes fall {
    0% { transform: translateY(-10vh) rotate(0deg); opacity: 0; }
    10% { opacity: 0.85; }
    90% { opacity: 0.85; }
    100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
  }

  .plan-page > * { position: relative; z-index: 2; flex-shrink: 0; }

  .photo {
    width: min(760px, 94vw);
    aspect-ratio: 498 / 337;
    border-radius: 28px;
    background: linear-gradient(135deg, #fff0f5, #ffe0ec);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    font-size: 120px;
    box-shadow: 0 10px 30px rgba(255, 105, 180, 0.3),
                0 0 0 8px rgba(255, 255, 255, 0.6);
    margin-bottom: 22px;
    animation: bob 3s ease-in-out infinite;
  }

  .photo img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  @keyframes bob {
    0%, 100% { transform: translateY(0) rotate(-2deg); }
    50% { transform: translateY(-10px) rotate(2deg); }
  }

  .plan-page h2 {
    font-family: 'Fredoka', sans-serif;
    font-weight: 700;
    font-size: clamp(1.9rem, 6vw, 3.2rem);
    color: #d6336c;
    text-shadow: 2px 2px 0 #fff;
    margin-bottom: 14px;
    max-width: 800px;
    line-height: 1.25;
  }

  .plan-card {
    background: rgba(255,255,255,0.55);
    border-radius: 22px;
    padding: 20px 26px;
    margin: 10px 0 22px;
    max-width: 560px;
    box-shadow: 0 8px 24px rgba(214, 51, 108, 0.18);
    display: flex;
    align-items: center;
    gap: 22px;
    text-align: left;
  }

  .plan-card .poster {
    width: 130px;
    flex-shrink: 0;
    border-radius: 14px;
    display: block;
    box-shadow: 0 8px 20px rgba(214, 51, 108, 0.35),
                0 0 0 4px rgba(255, 255, 255, 0.7);
  }

  .plan-card p {
    font-size: clamp(1.05rem, 2.8vw, 1.3rem);
    color: #8e4a6e;
    font-weight: 700;
    margin-bottom: 10px;
  }

  .plan-card p:last-child { margin-bottom: 0; }

  .plan-card .movie {
    font-family: 'Fredoka', sans-serif;
    font-weight: 700;
    color: #d6336c;
    font-size: clamp(1.4rem, 3.5vw, 1.8rem);
  }

  .plan-card .joke {
    font-size: clamp(0.95rem, 2.4vw, 1.1rem);
    color: #a85580;
    font-weight: 700;
    font-style: italic;
  }

  .emojis-line {
    font-size: clamp(2rem, 6vw, 3rem);
    letter-spacing: 0.2em;
    animation: bob 2s ease-in-out infinite;
  }

  @media (max-width: 480px) {
    .photo { width: 94vw; font-size: 80px; }
    .btn { font-size: 1.15rem; padding: 15px 28px; }
    .buttons { gap: 16px; }
    .alert-body { padding: 14px 16px; }
    .plan-card {
      flex-direction: column;
      text-align: center;
      gap: 14px;
      padding: 18px 20px;
    }
    .plan-card .poster { width: 150px; }
  }
</style>
</head>
<body>

<!-- ============ ALERT PAGE ============ -->
<div class="alert-page" id="alertPage">
  <div class="beacon" aria-hidden="true"></div>
  <div class="marquee" aria-hidden="true">
    <span>🚨 ALERTA 🚨 ALERTA 🚨 ALERTA 🚨 ALERTA 🚨 ALERTA 🚨 ALERTA 🚨 ALERTA 🚨</span>
  </div>

  <audio id="alarm" src="danger-alarm-sound-effect-meme.mp3" loop preload="auto"></audio>

  <div class="alert-content">
    <div class="siren-icon"><img src="bunny-hopping.gif" alt="alerta conejo" onerror="this.replaceWith(document.createTextNode('🚨'))"></div>
    <h1 class="alert-title">URGENTE</h1>

    <div class="alert-body">
      <p><strong>TENEMOS UNA CITA!!</strong></p>
      <p class="small">Esta vez sos libre de elegir la opción que quieras</p>
    </div>

    <div class="buttons">
      <button class="btn btn-yes" id="btnYes">Aceptar 🫡</button>
      <button class="btn btn-no" id="btnNo"><span class="face">No quiero</span><span class="reveal">Que pena aceptas igual</span></button>
    </div>
  </div>
</div>

<!-- ============ PLAN / CUTE PAGE ============ -->
<div class="plan-page" id="planPage">
  <div class="emoji-rain" id="emojiRain" aria-hidden="true"></div>

  <div class="photo"><img src="conejito-pochoclos.gif" alt="gif" onerror="this.replaceWith(Object.assign(document.createElement('span'),{textContent:'🍿',style:'font-size:90px'}))"></div>

  <h2>Vamos al cine a ver</h2>

  <div class="plan-card">
    <img class="poster" src="pelicula.jpg" alt="Obsession" onerror="this.style.display='none'">
    <div class="plan-info">
      <p class="movie">Obsession</p>
      <p class="joke">Si te portás bien te hago una pizza 🍕 (sin pera)</p>
    </div>
  </div>

  <div class="emojis-line">✨ 🍿 🍿 🍿 ✨</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
<script>
  // ============ Alarm sound ============
  const alarm = document.getElementById('alarm');
  const soundHint = document.getElementById('soundHint');
  alarm.volume = 0.6;
  let alarmStopped = false;

  function playAlarm() {
    if (alarmStopped) return;
    // browser may block autoplay until a real gesture (click/touch/key)
    alarm.play().then(() => {
      if (soundHint) soundHint.style.display = 'none';
    }).catch(() => {});
  }

  function stopAlarm() {
    alarmStopped = true;
    alarm.pause();
    alarm.currentTime = 0;
    if (soundHint) soundHint.style.display = 'none';
  }

  // Try immediately; if blocked, start on the first interaction anywhere
  playAlarm();
  ['pointerdown', 'touchstart', 'keydown', 'click'].forEach(evt => {
    document.addEventListener(evt, playAlarm, { once: true });
  });

  // ============ Emoji rain (plan page) ============
  const rainContainer = document.getElementById('emojiRain');
  const emojis = ['🍕', '🍿', '🎬', '🎟️', '💖', '✨', '🫶'];
  const EMOJI_COUNT = 30;

  for (let i = 0; i < EMOJI_COUNT; i++) {
    const span = document.createElement('span');
    span.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    span.style.left = Math.random() * 100 + 'vw';
    span.style.animationDuration = (6 + Math.random() * 8) + 's';
    span.style.animationDelay = (Math.random() * 10) + 's';
    span.style.fontSize = (18 + Math.random() * 24) + 'px';
    rainContainer.appendChild(span);
  }

  // ============ Aceptar -> plan page + confetti ============
  const btnYes = document.getElementById('btnYes');
  const alertPage = document.getElementById('alertPage');
  const planPage = document.getElementById('planPage');

  function launchConfetti() {
    const duration = 4000;
    const end = Date.now() + duration;
    const colors = ['#ff6b9d', '#ff8fab', '#d6336c', '#ffd6e8', '#e8d6ff', '#ffe5d4'];

    (function frame() {
      confetti({ particleCount: 4, angle: 60, spread: 60, origin: { x: 0, y: 0.7 }, colors, scalar: 1.1 });
      confetti({ particleCount: 4, angle: 120, spread: 60, origin: { x: 1, y: 0.7 }, colors, scalar: 1.1 });
      if (Date.now() < end) requestAnimationFrame(frame);
    })();

    confetti({ particleCount: 150, spread: 100, origin: { y: 0.5 }, colors, shapes: ['circle', 'square'] });

    const heartInterval = setInterval(() => {
      confetti({ particleCount: 30, spread: 80, origin: { x: Math.random(), y: Math.random() * 0.5 }, colors, scalar: 1.3 });
    }, 800);
    setTimeout(() => clearInterval(heartInterval), duration);
  }

  function goToPlan() {
    stopAlarm();
    alertPage.style.display = 'none';
    planPage.classList.add('show');
    launchConfetti();
  }

  btnYes.addEventListener('click', goToPlan);

  // ============ Hydra: clicking "No quiero" spawns more "Aceptar" buttons ============
  const btnNo = document.getElementById('btnNo');
  const MAX_CLONES = 40;
  let cloneCount = 0;

  function spawnAccepts(n) {
    for (let i = 0; i < n && cloneCount < MAX_CLONES; i++) {
      cloneCount++;
      const b = document.createElement('button');
      b.className = 'btn btn-yes clone';
      b.textContent = 'Aceptar 🫡';

      const margin = 12;
      const w = 180, h = 64; // approx button footprint
      const left = margin + Math.random() * (window.innerWidth - w - margin * 2);
      const top = margin + Math.random() * (window.innerHeight - h - margin * 2);
      b.style.left = Math.max(margin, left) + 'px';
      b.style.top = Math.max(margin, top) + 'px';

      b.addEventListener('click', goToPlan);
      alertPage.appendChild(b);
    }
  }

  btnNo.addEventListener('click', () => {
    spawnAccepts(3);
  });
</script>

</body>
</html>
